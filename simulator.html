<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MOWANI — Customize</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="sim-header">
    <a class="sim-logo" href="/">MOWANI</a>
    <span class="sim-badge">Customizer</span>
</header>

<main class="sim-layout">

    <!-- ─ Left: Full-height product gallery ─ -->
    <section class="sim-gallery" aria-label="상품 미리보기">
        <div class="sim-stage" id="previewStage">
            <img class="glass-layer glass-body" src="assets/glass-body.png" alt="유리잔 본체">
            <img class="glass-layer glass-handle" id="handleImage" src="assets/handle-pink.png" alt="선택된 손잡이">
        </div>
        <p class="sim-gallery-label" id="previewLabel">Pink Handle</p>
    </section>

    <!-- ─ Right: Options panel ─ -->
    <aside class="sim-panel" aria-label="옵션 선택">
        <div class="sim-panel-body">

            <header class="sim-panel-header">
                <p class="sim-eyebrow">Handcrafted Glassware</p>
                <h1 class="sim-title">Create<br>your piece</h1>
                <p class="sim-sub">유리잔 본체는 고정이며, 핸들 색상만 변경됩니다.</p>
            </header>

            <div class="sim-section">
                <div class="sim-section-head">
                    <span class="sim-section-label">Handle</span>
                    <span class="sim-section-value" id="selectedLabel">Pink Handle</span>
                </div>
                <div class="sim-swatches" id="optionList" role="listbox" aria-label="핸들 색상"></div>
            </div>

            <div class="sim-rule"></div>

            <div class="sim-summary">
                <p class="sim-summary-eyebrow">Your Selection</p>
                <p class="sim-summary-name" id="summaryLabel">Pink Handle</p>
                <p class="sim-summary-price">₩ 38,000</p>
            </div>

            <div class="sim-actions">
                <button class="sim-btn sim-btn--fill" type="button">Add to Cart</button>
                <button class="sim-btn sim-btn--outline" type="button">바로 구매</button>
            </div>

            <details class="sim-dev">
                <summary>
                    <span>Alignment</span>
                    <span class="sim-dev-tag">dev</span>
                    <span class="sim-dev-arrow">›</span>
                </summary>
                <div class="sim-dev-body">
                    <dl class="sim-metrics">
                        <div><dt>top</dt><dd id="metricTop">0px</dd></div>
                        <div><dt>left</dt><dd id="metricLeft">0px</dd></div>
                        <div><dt>width</dt><dd id="metricWidth">0px</dd></div>
                    </dl>
                    <p class="sim-hint">방향키 1px &nbsp;·&nbsp; Shift 10px &nbsp;·&nbsp; [ / ] 너비</p>
                    <p class="sim-hint" id="summaryPath">assets/handle-pink.png</p>
                    <button class="sim-copy-btn" id="copyConfigButton" type="button">Config 복사</button>
                    <p class="sim-hint" id="copyStatus" aria-live="polite"></p>
                </div>
            </details>

        </div>
    </aside>

</main>

<script src="js/simulator.js"></script>
</body>
</html>
