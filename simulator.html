<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Glass Customizer Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="simulator-page">
        <section class="product-preview" aria-label="상품 미리보기">
            <div class="preview-sticky">
                <p class="eyebrow">Handcrafted Glass Studio</p>
                <h1>Layered Glass Customizer</h1>
                <div class="preview-stage" id="previewStage">
                    <img class="glass-layer glass-body" src="assets/glass-body.png" alt="유리잔 본체">
                    <img class="glass-layer glass-handle" id="handleImage" src="assets/handle-pink.png" alt="선택된 손잡이 옵션">
                </div>
            </div>
        </section>

        <aside class="customizer-panel" aria-label="옵션 선택">
            <div class="panel-header">
                <p class="eyebrow">Made to Order</p>
                <h2>하단 손잡이/받침 선택</h2>
                <p class="panel-copy">유리잔 본체는 고정 레이어로 유지되고, 선택한 하단 옵션만 교체됩니다.</p>
            </div>

            <div class="option-group">
                <div class="section-title">
                    <span>Handle Finish</span>
                    <strong id="selectedLabel">Pink Handle</strong>
                </div>
                <div class="option-list" id="optionList" role="listbox" aria-label="손잡이 옵션"></div>
            </div>

            <div class="summary-box">
                <div>
                    <span>선택 옵션</span>
                    <strong id="summaryLabel">Pink Handle</strong>
                </div>
                <div>
                    <span>레이어 이미지</span>
                    <strong id="summaryPath">assets/handle-pink.png</strong>
                </div>
            </div>

            <div class="dev-tools" aria-label="개발용 위치 조정 도구">
                <div class="section-title">
                    <span>Alignment Tools</span>
                    <strong>Dev</strong>
                </div>
                <dl class="metrics">
                    <div>
                        <dt>top</dt>
                        <dd id="metricTop">0px</dd>
                    </div>
                    <div>
                        <dt>left</dt>
                        <dd id="metricLeft">0px</dd>
                    </div>
                    <div>
                        <dt>width</dt>
                        <dd id="metricWidth">0px</dd>
                    </div>
                </dl>
                <p class="hint">방향키 1px, Shift + 방향키 10px, [ / ] 너비 조정</p>
                <button class="copy-button" id="copyConfigButton" type="button">Config 복사</button>
                <p class="copy-status" id="copyStatus" aria-live="polite"></p>
            </div>

            <div class="purchase-actions">
                <button class="secondary-button" type="button">장바구니</button>
                <button class="primary-button" type="button">바로 구매</button>
            </div>
        </aside>
    </main>

    <script src="js/simulator.js"></script>
</body>
</html>
